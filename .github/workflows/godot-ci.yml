name: "Godot CI / PR Checks"

on:
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  check-project:
    name: "Validar Projeto Godot"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do Código
        uses: actions/checkout@v5

      - name: Configurar Godot Engine
        uses: chickensoft-games/setup-godot@v2
        with:
          version: '4.7.1'
          use-dotnet: false

      - name: Verificar erros de importação/scripts (Import Check)
        run: |
          godot --headless --editor --quit

      # Opcional: Se você usa a biblioteca GUT para testes unitários
      # - name: Rodar Testes com GUT
      #   run: |
      #     godot --headless -s addons/gut/gut_cmdln.gd